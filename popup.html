<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tweakX Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup">
    <div class="brand">
      <img class="brand-logo" src="icons/icon48.png" alt="tweakX logo" />

  </main>
  <script src="popup.js"></script>
</body>
</html>
